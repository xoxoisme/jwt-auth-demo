spring:
  datasource:
    url: jdbc:h2:mem:jwt_auth_demo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: DEBUG

app:
  jwt:
    # 최소 32바이트 이상(HS256 기준) 강한 랜덤 문자열로 바꿔주세요.
    secret: "change-me-to-a-very-long-random-secret-at-least-32-bytes"
    access-token-ttl-seconds: 3600
    issuer: "jwt-auth-demo"
